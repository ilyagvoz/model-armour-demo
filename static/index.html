<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Armor — AI Safety Shield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            surface: {
              950: '#ffffff',
              900: '#f8fafc',
              800: '#f1f5f9',
              700: '#e2e8f0',
              600: '#94a3b8',
            },
            safe: {
              DEFAULT: '#059669',
              dim: '#d1fae533',
              glow: '#a7f3d066',
            },
            blocked: {
              DEFAULT: '#dc2626',
              dim: '#fee2e233',
              glow: '#fecaca66',
            },
            warn: {
              DEFAULT: '#d97706',
              dim: '#fef3c733',
              glow: '#fde68a66',
            },
            accent: {
              DEFAULT: '#4f46e5',
              dim: '#eef2ff',
            },
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #f8fafc;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Subtle grid background */
    .bg-grid {
      background-image:
        linear-gradient(rgba(79, 70, 229, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Scan line animation */
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    .scan-line {
      animation: scan 1.5s ease-in-out infinite;
    }

    /* Pulse glow for blocked */
    @keyframes pulse-blocked {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
      50% { box-shadow: 0 0 16px 4px rgba(220, 38, 38, 0.15); }
    }
    .pulse-blocked { animation: pulse-blocked 2s ease-in-out infinite; }

    @keyframes pulse-safe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
      50% { box-shadow: 0 0 16px 4px rgba(5, 150, 105, 0.12); }
    }
    .pulse-safe { animation: pulse-safe 2s ease-in-out infinite; }

    /* Stagger in */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stagger-in {
      animation: slideUp 0.4s ease-out forwards;
      opacity: 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* JSON syntax */
    .json-key { color: #4f46e5; }
    .json-string { color: #059669; }
    .json-number { color: #d97706; }
    .json-bool { color: #dc2626; }
    .json-null { color: #94a3b8; }

    /* Scenario card hover */
    .scenario-card {
      transition: all 0.2s ease;
    }
    .scenario-card:hover {
      transform: translateY(-2px);
    }
    .scenario-card.active {
      border-color: #4f46e5 !important;
      background: rgba(79, 70, 229, 0.06) !important;
    }

    /* Filter result card */
    .filter-card {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body class="bg-grid min-h-screen text-gray-700 antialiased" x-data="app()" x-init="init()">

  <!-- Top bar -->
  <header class="border-b border-gray-200 backdrop-blur-sm bg-white/95 sticky top-0 z-50 shadow-sm">
    <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-lg bg-accent/10 border border-accent/30 flex items-center justify-center">
            <i data-lucide="shield-check" class="w-5 h-5 text-accent"></i>
          </div>
          <div class="w-9 h-9 rounded-lg bg-warn/10 border border-warn/30 flex items-center justify-center">
            <i data-lucide="eraser" class="w-5 h-5 text-warn"></i>
          </div>
        </div>
        <div>
          <h1 class="font-display font-bold text-gray-900 text-base tracking-tight flex items-center gap-2">
            <span>Model Armor</span>
            <span class="text-gray-400">·</span>
            <span class="text-warn">Sensitive Data Protection</span>
          </h1>
          <p class="text-xs text-gray-500 font-mono tracking-widest uppercase">GCP AI Safety Shield</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div x-show="llmConfig" class="flex items-center gap-1.5 text-xs font-mono text-gray-500 border border-gray-200 rounded-md px-2.5 py-1.5 bg-white">
          <i data-lucide="cpu" class="w-3.5 h-3.5 text-safe"></i>
          <span x-text="llmConfig?.model"></span>
        </div>
        <div x-show="templateReady && templateRegion" class="flex items-center gap-1.5 text-xs font-mono text-gray-500 border border-gray-200 rounded-md px-2.5 py-1.5 bg-white">
          <i data-lucide="map-pin" class="w-3.5 h-3.5 text-accent"></i>
          <span x-text="templateRegion"></span>
        </div>

        <!-- Sensitivity preset selector -->
        <div x-show="templateReady" class="flex items-center gap-2">
          <span class="text-xs font-mono text-gray-400 uppercase tracking-wider">Sensitivity</span>
          <div class="flex items-center bg-gray-100 rounded-lg p-0.5 border border-gray-200">
            <template x-for="preset in [{label:'Low', value:'LOW_AND_ABOVE'}, {label:'Med', value:'MEDIUM_AND_ABOVE'}, {label:'High', value:'HIGH'}]" :key="preset.value">
              <button
                @click="applyPreset(preset.value)"
                :disabled="configApplying"
                class="px-3 py-1 rounded-md text-xs font-mono font-semibold transition-all disabled:opacity-40"
                :class="config.pi_confidence === preset.value
                  ? 'bg-accent text-white shadow-sm'
                  : 'text-gray-500 hover:text-gray-700'"
                x-text="configApplying && config.pi_confidence === preset.value ? '...' : preset.label"
              ></button>
            </template>
          </div>
        </div>

        <div class="flex items-center gap-2 text-sm font-mono">
          <span class="w-2 h-2 rounded-full" :class="templateReady ? 'bg-safe' : 'bg-blocked'"></span>
          <span class="text-gray-500" x-text="templateReady ? 'Template Active' : 'Template Not Ready'"></span>
        </div>
        <button
          @click="showConfig = !showConfig"
          class="p-2 rounded-md hover:bg-gray-100 transition-colors"
          :class="showConfig ? 'bg-gray-100 text-accent' : 'text-gray-500'"
        >
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto px-6 py-6">

    <!-- Setup banner -->
    <template x-if="templateChecked && !templateReady && !setupLoading">
      <div class="mb-6 p-4 rounded-xl border border-warn/40 bg-warn/5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i data-lucide="alert-circle" class="w-5 h-5 text-warn"></i>
          <p class="text-base text-warn">Template not configured. Create one with all filters enabled to start scanning.</p>
        </div>
        <button @click="setupTemplate()" class="px-4 py-2 rounded-lg bg-warn text-white text-sm font-semibold hover:brightness-110 transition">
          Setup Template
        </button>
      </div>
    </template>

    <template x-if="setupLoading">
      <div class="mb-6 p-4 rounded-xl border border-accent/30 bg-accent/5 flex items-center gap-3">
        <div class="w-4 h-4 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
        <p class="text-base text-accent">Setting up template...</p>
      </div>
    </template>

    <!-- Config panel -->
    <template x-if="showConfig">
      <div class="mb-6 rounded-xl border border-gray-200 bg-white overflow-hidden stagger-in shadow-sm">
        <div class="px-5 py-3 border-b border-gray-200 flex items-center justify-between">
          <h2 class="text-base font-semibold text-gray-900 font-display">Template Configuration</h2>
          <span class="text-xs font-mono text-gray-400 tracking-wider" x-text="templateName"></span>
        </div>
        <div class="p-5 grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="space-y-2">
            <div class="flex items-center gap-1.5">
              <label class="text-sm font-mono text-gray-500 uppercase tracking-wider">PI & Jailbreak</label>
              <div class="relative group">
                <i data-lucide="info" class="w-3.5 h-3.5 text-gray-400 cursor-help"></i>
                <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-2.5 rounded-lg bg-gray-900 text-white text-xs leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg">
                  <strong class="block mb-1 text-white">Prompt Injection & Jailbreak</strong>
                  Detects attempts to hijack or override your AI system's instructions — whether through injected commands or creative role-play scenarios (e.g. "DAN" prompts).
                </div>
              </div>
            </div>
            <select x-model="config.pi_confidence"
              class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-accent">
              <option value="LOW_AND_ABOVE">Low & Above</option>
              <option value="MEDIUM_AND_ABOVE">Medium & Above</option>
              <option value="HIGH">High Only</option>
            </select>
          </div>
          <div class="space-y-2">
            <div class="flex items-center gap-1.5">
              <label class="text-sm font-mono text-gray-500 uppercase tracking-wider">RAI Filters</label>
              <div class="relative group">
                <i data-lucide="info" class="w-3.5 h-3.5 text-gray-400 cursor-help"></i>
                <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-2.5 rounded-lg bg-gray-900 text-white text-xs leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg">
                  <strong class="block mb-1 text-white">Responsible AI Filters</strong>
                  Screens content across four harm categories: hate speech, harassment, sexually explicit material, and dangerous content.
                </div>
              </div>
            </div>
            <select x-model="config.rai_confidence"
              class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-accent">
              <option value="LOW_AND_ABOVE">Low & Above</option>
              <option value="MEDIUM_AND_ABOVE">Medium & Above</option>
              <option value="HIGH">High Only</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-mono text-gray-500 uppercase tracking-wider">Malicious URI</label>
            <label class="flex items-center gap-2 mt-2.5 cursor-pointer">
              <input type="checkbox" x-model="config.malicious_uri_enabled"
                class="w-4 h-4 rounded border-gray-300 bg-white text-accent focus:ring-accent/50">
              <span class="text-sm text-gray-700">Enabled</span>
            </label>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-mono text-gray-500 uppercase tracking-wider">Sensitive Data</label>
            <label class="flex items-center gap-2 mt-2.5 cursor-pointer">
              <input type="checkbox" x-model="config.sdp_enabled"
                class="w-4 h-4 rounded border-gray-300 bg-white text-accent focus:ring-accent/50">
              <span class="text-sm text-gray-700">Enabled</span>
            </label>
          </div>
        </div>
        <div class="px-5 py-3 border-t border-gray-200 flex justify-end">
          <button @click="applyConfig()"
            class="px-4 py-2 rounded-lg bg-accent text-white text-sm font-semibold hover:brightness-110 transition"
            :disabled="configApplying">
            <span x-show="!configApplying">Apply & Recreate Template</span>
            <span x-show="configApplying" class="flex items-center gap-2">
              <span class="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
              Applying...
            </span>
          </button>
        </div>
      </div>
    </template>

    <!-- Main layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Left: Input Panel -->
      <div class="space-y-5">
        <!-- Scenario cards -->
        <div>
          <h2 class="text-sm font-mono text-gray-500 uppercase tracking-wider mb-3">Attack Scenarios</h2>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
            <template x-for="scenario in scenarios" :key="scenario.id">
              <button
                @click="selectScenario(scenario)"
                class="scenario-card p-3 rounded-xl border text-left"
                :class="activeScenario?.id === scenario.id
                  ? 'active border-accent/40 bg-accent/5'
                  : 'border-gray-200 bg-white hover:bg-gray-50 hover:border-gray-300'"
              >
                <div class="flex items-center gap-2 mb-1.5">
                  <i :data-lucide="scenario.icon" class="w-4 h-4"
                     :class="scenario.expected_filters.length === 0 ? 'text-safe' : 'text-blocked'"></i>
                  <span class="text-base font-semibold text-gray-900 truncate" x-text="scenario.name"></span>
                </div>
                <p class="text-sm text-gray-500 leading-relaxed line-clamp-2" x-text="scenario.description"></p>
              </button>
            </template>
          </div>
        </div>

        <!-- Text area -->
        <div class="relative">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-sm font-mono text-gray-500 uppercase tracking-wider">Input Text</h2>
            <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5">
              <button
                @click="mode = 'prompt'"
                class="px-3 py-1.5 rounded-md text-sm font-medium transition-all"
                :class="mode === 'prompt' ? 'bg-accent text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
              >
                <span class="flex items-center gap-1.5">
                  <i data-lucide="arrow-up-circle" class="w-3.5 h-3.5"></i>
                  Sanitize Prompt
                </span>
              </button>
              <button
                @click="mode = 'response'"
                class="px-3 py-1.5 rounded-md text-sm font-medium transition-all"
                :class="mode === 'response' ? 'bg-accent text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
              >
                <span class="flex items-center gap-1.5">
                  <i data-lucide="arrow-down-circle" class="w-3.5 h-3.5"></i>
                  Sanitize Response
                </span>
              </button>
              <button
                @click="mode = 'pipeline'"
                class="px-3 py-1.5 rounded-md text-sm font-medium transition-all"
                :class="mode === 'pipeline' ? 'bg-safe text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
              >
                <span class="flex items-center gap-1.5">
                  <i data-lucide="workflow" class="w-3.5 h-3.5"></i>
                  Full Pipeline
                </span>
              </button>
              <button
                @click="mode = 'deidentify'"
                class="px-3 py-1.5 rounded-md text-sm font-medium transition-all"
                :class="mode === 'deidentify' ? 'bg-warn text-white shadow-sm' : 'text-gray-500 hover:text-gray-700'"
              >
                <span class="flex items-center gap-1.5">
                  <i data-lucide="eraser" class="w-3.5 h-3.5"></i>
                  De-identify
                </span>
              </button>
            </div>
          </div>
          <p class="text-sm text-gray-500 mb-3 transition-all"
             x-text="mode === 'prompt'
               ? 'Screen user input before it reaches your LLM'
               : mode === 'response'
                 ? 'Screen LLM output before it reaches the end user'
                 : mode === 'pipeline'
                   ? 'Prompt → Model Armor → Gemini → Model Armor → Result'
                   : 'Sensitive Data Protection replaces names and emails with tokens before sending to Gemini'"></p>

          <!-- De-identify info type selector -->
          <template x-if="mode === 'deidentify'">
            <div class="rounded-xl border border-warn/30 bg-warn/5 overflow-hidden mb-3">
              <div class="px-4 py-2.5 border-b border-warn/20 flex items-center gap-2">
                <i data-lucide="sliders-horizontal" class="w-4 h-4 text-warn"></i>
                <span class="text-sm font-semibold text-warn">Info Types to Redact</span>
              </div>
              <div class="p-4 grid grid-cols-1 gap-y-3">
                <template x-for="group in ['Identity', 'Australian PII', 'Financial']" :key="group">
                  <div>
                    <p class="text-xs font-mono text-gray-400 uppercase tracking-wider mb-1.5" x-text="group"></p>
                    <div class="grid grid-cols-2 gap-1.5">
                      <template x-for="item in deidentifyTypesMeta.filter(m => m.group === group)" :key="item.key">
                        <label class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg cursor-pointer transition-colors"
                               :class="deidentifyTypes[item.key] ? 'bg-warn/10 border border-warn/30' : 'bg-white border border-gray-200 hover:border-gray-300'">
                          <input type="checkbox"
                                 :checked="deidentifyTypes[item.key]"
                                 @change="deidentifyTypes[item.key] = $event.target.checked"
                                 class="w-3.5 h-3.5 rounded border-gray-300 bg-white accent-amber-500">
                          <span class="text-sm text-gray-700 flex-1" x-text="item.label"></span>
                          <template x-if="item.tooltip">
                            <div class="relative group" @click.prevent>
                              <i data-lucide="info" class="w-3.5 h-3.5 text-gray-400 hover:text-gray-600 cursor-help shrink-0"></i>
                              <div class="absolute bottom-full right-0 mb-2 w-72 p-2.5 rounded-lg bg-gray-900 text-white text-xs leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg">
                                <span x-text="item.tooltip"></span>
                              </div>
                            </div>
                          </template>
                        </label>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <div class="relative">
            <textarea
              x-model="inputText"
              rows="8"
              placeholder="Type a prompt to scan, or select a scenario above..."
              class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-sm font-mono text-gray-800 placeholder:text-gray-400 focus:outline-none focus:border-accent/60 focus:ring-2 focus:ring-accent/10 resize-none shadow-sm"
            ></textarea>
            <!-- Scanning overlay -->
            <template x-if="scanning">
              <div class="absolute inset-0 rounded-xl overflow-hidden pointer-events-none">
                <div class="absolute inset-0 bg-accent/5"></div>
                <div class="scan-line absolute left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-accent to-transparent"></div>
              </div>
            </template>
          </div>
        </div>

        <!-- Scan / Pipeline / De-identify button -->
        <button
          @click="mode === 'pipeline' ? sendPipeline() : mode === 'deidentify' ? sendDeidentify() : scan()"
          :disabled="!inputText.trim() || scanning || pipelineSending || deidentifying || (mode !== 'deidentify' && !templateReady)"
          class="w-full py-3.5 rounded-xl font-display font-semibold text-base transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed shadow-sm"
          :class="(scanning || pipelineSending || deidentifying)
            ? (mode === 'pipeline' ? 'bg-safe/10 text-safe border border-safe/30' : mode === 'deidentify' ? 'bg-warn/10 text-warn border border-warn/30' : 'bg-accent/10 text-accent border border-accent/30')
            : (mode === 'pipeline' ? 'bg-safe text-white hover:brightness-110 hover:shadow-lg hover:shadow-safe/20' : mode === 'deidentify' ? 'bg-warn text-white hover:brightness-110 hover:shadow-lg hover:shadow-warn/20' : 'bg-accent text-white hover:brightness-110 hover:shadow-lg hover:shadow-accent/20')"
        >
          <template x-if="!scanning && !pipelineSending && !deidentifying">
            <span class="flex items-center gap-2">
              <i :data-lucide="mode === 'pipeline' ? 'workflow' : mode === 'deidentify' ? 'eraser' : 'scan'" class="w-5 h-5"></i>
              <span x-text="mode === 'pipeline' ? 'Send to Pipeline' : mode === 'deidentify' ? 'De-identify with SDP' : 'Scan with Model Armor'"></span>
            </span>
          </template>
          <template x-if="scanning || pipelineSending || deidentifying">
            <span class="flex items-center gap-2">
              <span class="w-5 h-5 border-2 rounded-full animate-spin" :class="mode === 'pipeline' ? 'border-safe border-t-transparent' : mode === 'deidentify' ? 'border-warn border-t-transparent' : 'border-accent border-t-transparent'"></span>
              <span x-text="mode === 'pipeline' ? 'Running Pipeline...' : mode === 'deidentify' ? 'Redacting...' : 'Analyzing...'"></span>
            </span>
          </template>
        </button>

        <!-- Scenario explanation -->
        <template x-if="activeScenario">
          <div class="p-4 rounded-xl border border-gray-200 bg-white stagger-in shadow-sm">
            <div class="flex items-start gap-3">
              <i data-lucide="info" class="w-4 h-4 text-accent mt-0.5 shrink-0"></i>
              <div>
                <h3 class="text-sm font-semibold text-gray-900 mb-1" x-text="activeScenario.name + ' — How it works'"></h3>
                <p class="text-sm text-gray-600 leading-relaxed" x-text="activeScenario.explanation"></p>
                <div class="mt-2 flex flex-wrap gap-1.5" x-show="activeScenario.expected_filters.length > 0">
                  <span class="text-xs font-mono text-gray-400">Expected filters:</span>
                  <template x-for="f in activeScenario.expected_filters" :key="f">
                    <span class="px-1.5 py-0.5 rounded bg-blocked/10 text-blocked text-xs font-mono" x-text="f"></span>
                  </template>
                </div>
                <div class="mt-2" x-show="activeScenario.expected_filters.length === 0">
                  <span class="px-1.5 py-0.5 rounded bg-safe/10 text-safe text-xs font-mono">All filters should pass</span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Right: Results Panel -->
      <div class="space-y-5">

        <!-- Pipeline Results -->
        <template x-if="pipelineResult">
          <div class="space-y-3 stagger-in">
            <h2 class="text-sm font-mono text-gray-500 uppercase tracking-wider">Pipeline Results</h2>

            <!-- Step 1: Prompt Scan -->
            <div class="rounded-xl border p-4"
                 :class="pipelineResult.prompt_scan.overall_match === 'MATCH_FOUND'
                   ? 'border-blocked/30 bg-blocked/5'
                   : 'border-safe/30 bg-safe/5'">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold"
                     :class="pipelineResult.prompt_scan.overall_match === 'MATCH_FOUND'
                       ? 'bg-blocked text-white' : 'bg-safe text-white'">1</div>
                <div class="flex-1">

            <button @click="showRawJson = !showRawJson"
              class="flex items-center gap-2 text-sm font-mono text-gray-500 hover:text-gray-700 transition mb-2">
              <i :data-lucide="showRawJson ? 'chevron-down' : 'chevron-right'" class="w-3.5 h-3.5"></i>
              Raw API Response
            </button>
            <template x-if="showRawJson">
              <div class="rounded-xl border border-gray-200 bg-gray-50 p-4 overflow-auto max-h-80">
                <pre class="text-xs font-mono leading-relaxed" x-html="syntaxHighlight(JSON.stringify(result, null, 2))"></pre>
              </div>
            </template>
          </div>
        </template>

        <!-- Error display -->
        <template x-if="error">
          <div class="rounded-xl border border-blocked/30 bg-blocked/5 p-4 stagger-in">
            <div class="flex items-start gap-3">
              <i data-lucide="x-circle" class="w-4 h-4 text-blocked mt-0.5 shrink-0"></i>
              <div>
                <h3 class="text-base font-semibold text-blocked mb-1">Error</h3>
                <p class="text-sm text-gray-600 font-mono" x-text="error"></p>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </main>

  <script>
    function app() {
      return {
        scenarios: [],
        activeScenario: null,
        inputText: '',
        mode: 'prompt',
        scanning: false,
        result: null,
        pipelineResult: null,
        pipelineSending: false,
        deidentifyResult: null,
        deidentifying: false,
        deidentifyTypes: {
          PERSON_NAME: true,
          EMAIL_ADDRESS: true,
          AUSTRALIA_TAX_FILE_NUMBER: true,
          AUSTRALIA_MEDICARE_NUMBER: true,
          AUSTRALIA_DRIVERS_LICENSE_NUMBER: false,
          AUSTRALIA_PASSPORT: false,
          PHONE_NUMBER: false,
          CREDIT_CARD_NUMBER: false,
        },
        deidentifyTypesMeta: [
          { group: 'Identity',      key: 'PERSON_NAME',                      label: 'Person Names' },
          { group: 'Identity',      key: 'EMAIL_ADDRESS',                    label: 'Email Addresses' },
          { group: 'Identity',      key: 'PHONE_NUMBER',                     label: 'Phone Numbers' },
          { group: 'Australian PII', key: 'AUSTRALIA_TAX_FILE_NUMBER',       label: 'Tax File Number (TFN)', tooltip: 'Sensitive Data Protection validates the TFN check digit using a weighted sum mod 11 algorithm (weights: 1,4,3,7,5,8,6,9,10). Numbers that fail this check are not detected, even at POSSIBLE likelihood.' },
          { group: 'Australian PII', key: 'AUSTRALIA_MEDICARE_NUMBER',       label: 'Medicare Number', tooltip: 'Sensitive Data Protection validates the Medicare check digit: the weighted sum of the first 8 digits (weights: 1,3,7,9,1,3,7,9) mod 10 must equal the 9th digit. The 10th digit is the Individual Reference Number and is not part of the checksum.' },
          { group: 'Australian PII', key: 'AUSTRALIA_DRIVERS_LICENSE_NUMBER', label: "Driver's Licence" },
          { group: 'Australian PII', key: 'AUSTRALIA_PASSPORT',              label: 'Passport' },
          { group: 'Financial',     key: 'CREDIT_CARD_NUMBER',               label: 'Credit Card' },
        ],
        llmConfig: null,
        error: null,
        templateReady: false,
        templateChecked: false,
        templateName: '',
        get templateRegion() {
          // Extract region from resource name: projects/.../locations/REGION/templates/...
          const match = this.templateName.match(/locations\/([^/]+)/);
          return match ? match[1] : '';
        },
        showConfig: false,
        showRawJson: false,
        setupLoading: false,
        configApplying: false,
        config: {
          pi_confidence: 'MEDIUM_AND_ABOVE',
          rai_confidence: 'MEDIUM_AND_ABOVE',
          malicious_uri_enabled: true,
          sdp_enabled: true,
          pi_enabled: true,
        },

        async init() {
          lucide.createIcons();
          await Promise.all([this.loadScenarios(), this.checkTemplate(), this.loadLlmConfig()]);
        },

        async loadScenarios() {
          try {
            const res = await fetch('/api/scenarios');
            this.scenarios = await res.json();
          } catch (e) {
            console.error('Failed to load scenarios:', e);
          }
          this.$nextTick(() => lucide.createIcons());
        },

        async checkTemplate() {
          try {
            const res = await fetch('/api/template');
            if (res.ok) {
              const data = await res.json();
              this.templateReady = true;
              this.templateName = data.name || '';
            } else {
              this.templateReady = false;
            }
          } catch {
            this.templateReady = false;
          }
          this.templateChecked = true;
        },

        async loadLlmConfig() {
          try {
            const res = await fetch('/api/llm-config');
            if (res.ok) this.llmConfig = await res.json();
          } catch { /* optional */ }
          this.$nextTick(() => lucide.createIcons());
        },

        async setupTemplate() {
          this.setupLoading = true;
          this.error = null;
          try {
            const res = await fetch('/api/setup', { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
              this.templateReady = true;
              this.templateName = data.template?.name || '';
            } else {
              this.error = data.detail || 'Failed to setup template';
            }
          } catch (e) {
            this.error = e.message;
          } finally {
            this.setupLoading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        selectScenario(scenario) {
          this.activeScenario = scenario;
          this.inputText = scenario.prompt;
          this.result = null;
          this.pipelineResult = null;
          this.deidentifyResult = null;
          this.error = null;
          if (scenario.mode) this.mode = scenario.mode;
          this.$nextTick(() => lucide.createIcons());
        },

        async scan() {
          if (!this.inputText.trim() || this.scanning) return;
          this.scanning = true;
          this.result = null;
          this.pipelineResult = null;
          this.deidentifyResult = null;
          this.error = null;

          const endpoint = this.mode === 'prompt'
            ? '/api/sanitize-prompt'
            : '/api/sanitize-response';

          try {
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.inputText }),
            });
            const data = await res.json();
            if (res.ok) {
              this.result = data;
            } else {
              this.error = data.detail || 'Sanitization failed';
            }
          } catch (e) {
            this.error = e.message;
          } finally {
            this.scanning = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        async sendPipeline() {
          if (!this.inputText.trim() || this.pipelineSending) return;
          this.pipelineSending = true;
          this.pipelineResult = null;
          this.result = null;
          this.deidentifyResult = null;
          this.error = null;

          try {
            const res = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.inputText }),
            });
            const data = await res.json();
            if (res.ok) {
              this.pipelineResult = data;
            } else {
              this.error = data.detail || 'Pipeline failed';
            }
          } catch (e) {
            this.error = e.message;
          } finally {
            this.pipelineSending = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        async sendDeidentify() {
          if (!this.inputText.trim() || this.deidentifying) return;
          this.deidentifying = true;
          this.deidentifyResult = null;
          this.result = null;
          this.pipelineResult = null;
          this.error = null;

          try {
            const res = await fetch('/api/deidentify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: this.inputText,
                info_types: Object.entries(this.deidentifyTypes)
                  .filter(([, enabled]) => enabled)
                  .map(([key]) => key),
              }),
            });
            const data = await res.json();
            if (res.ok) {
              this.deidentifyResult = data;
            } else {
              this.error = data.detail || 'De-identification failed';
            }
          } catch (e) {
            this.error = e.message;
          } finally {
            this.deidentifying = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        highlightTokens(text) {
          const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return escaped.replace(/\[([A-Z_]+)\]/g,
            '<span class="px-1 py-0.5 rounded bg-warn/20 text-warn font-bold">[$1]</span>');
        },

        async applyPreset(confidenceValue) {
          this.config.pi_confidence = confidenceValue;
          this.config.rai_confidence = confidenceValue;
          await this.applyConfig();
        },

        async applyConfig() {
          this.configApplying = true;
          this.error = null;
          try {
            const res = await fetch('/api/setup-custom', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.config),
            });
            const data = await res.json();
            if (res.ok) {
              this.templateReady = true;
              this.templateName = data.template?.name || '';
              this.showConfig = false;
            } else {
              this.error = data.detail || 'Failed to apply configuration';
            }
          } catch (e) {
            this.error = e.message;
          } finally {
            this.configApplying = false;
          }
        },

        syntaxHighlight(json) {
          return json.replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,
            (match) => {
              let cls = 'json-number';
              if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-string';
              } else if (/true|false/.test(match)) {
                cls = 'json-bool';
              } else if (/null/.test(match)) {
                cls = 'json-null';
              }
              return `<span class="${cls}">${match}</span>`;
            });
        },
      };
    }
  </script>
</body>
</html>
